<!DOCTYPE html>
<html>

<head>
    <title>AdaptiFlow Live Simulation</title>
    <style>
        /* Basic styling - expand this into a visual crossroad */
        body {
            font-family: sans-serif;
            text-align: center;
            background: #222;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            max-width: 600px;
            margin: auto;
        }

        .lane {
            padding: 20px;
            background: #333;
            border-radius: 8px;
        }

        .green-light {
            border: 2px solid #00ff00;
        }

        .ambulance-alert {
            background: #ff4444;
        }
    </style>
</head>

<body>
    <h1>🚦 Live Traffic Control Dashboard</h1>
    <h3 id="task-status">Task: Loading... | Reward: 0.0</h3>

    <div class="grid">
        <div></div>
        <div id="north" class="lane">North<br><span id="n-cars">0</span> cars</div>
        <div></div>

        <div id="west" class="lane">West<br><span id="w-cars">0</span> cars</div>
        <div class="intersection">🔄</div>
        <div id="east" class="lane">East<br><span id="e-cars">0</span> cars</div>

        <div></div>
        <div id="south" class="lane">South<br><span id="s-cars">0</span> cars</div>
        <div></div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                // Fetch live state from your FastAPI server
                const response = await fetch('/state');
                const data = await response.json();

                // Update text
                document.getElementById('n-cars').innerText = data.north_cars;
                document.getElementById('s-cars').innerText = data.south_cars;
                document.getElementById('e-cars').innerText = data.east_cars;
                document.getElementById('w-cars').innerText = data.west_cars;

                // Update metadata and handle highlights
                document.getElementById('task-status').innerText = `Task: ${data.task_id} | Reward: ${data.reward.toFixed(2)}`;

                // Clear previous lights/alerts
                document.querySelectorAll('.lane').forEach(el => el.classList.remove('green-light', 'ambulance-alert'));

                // Set green lights based on current phase
                if (data.current_green_0) document.getElementById(data.current_green_0).classList.add('green-light');
                if (data.current_green_1) document.getElementById(data.current_green_1).classList.add('green-light');

                // Flag ambulance
                if (data.ambulance && data.ambulance_lane) {
                    document.getElementById(data.ambulance_lane).classList.add('ambulance-alert');
                }
            } catch (error) {
                console.error("Simulation offline or waiting for step...");
            }
        }

        // Poll the server state every 500ms
        setInterval(updateDashboard, 500);
    </script>
</body>

</html>
